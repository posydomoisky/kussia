<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Репетиторы - УчебаВместе</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ----- ОРИГИНАЛЬНЫЕ СТИЛИ ----- */
        :root {
            --bg: #f8fafc;
            --card: #ffffff;
            --border: #e2e8f0;
            --fg: #1e293b;
            --muted-fg: #64748b;
            --primary: #3b82f6;
            --shadow: rgba(0,0,0,0.05);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--fg);
            line-height: 1.5;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; }
        header {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .logo a { font-size: 1.5rem; font-weight: bold; text-decoration: none; color: var(--primary); }
        nav { display: flex; gap: 1.5rem; }
        nav a { text-decoration: none; color: var(--fg); font-weight: 500; }
        .user-profile { display: flex; align-items: center; gap: 1rem; }
        .user-avatar {
            width: 40px; height: 40px; background: var(--primary); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; color: white; font-weight: bold;
        }
        .btn {
            padding: 0.5rem 1rem; border-radius: 0.5rem; cursor: pointer; border: none;
            font-weight: 500; transition: 0.2s;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--fg); }
        .teachers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
            margin: 2rem 0;
        }
        .teacher-card {
            background: var(--card);
            border-radius: 1rem;
            overflow: hidden;
            box-shadow: 0 4px 20px var(--shadow);
            transition: transform 0.2s;
        }
        .teacher-card:hover { transform: translateY(-4px); }
        .teacher-card-header {
            display: flex;
            gap: 1rem;
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
        }
        .teacher-avatar img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
        }
        .teacher-name { margin: 0 0 0.25rem; font-size: 1.25rem; }
        .teacher-subjects { color: var(--muted-fg); }
        .teacher-stats {
            display: flex;
            justify-content: space-around;
            background: var(--bg);
            padding: 0.75rem;
        }
        .stat-value { font-size: 1.3rem; font-weight: bold; color: var(--primary); }
        .teacher-description { padding: 1rem 1.5rem; }
        .teacher-actions { padding: 0 1.5rem 1.5rem; display: flex; gap: 1rem; }
        .not-taking-text {
            display: block; font-size: 0.85rem; padding: 0 1.5rem 1.5rem; color: #f59e0b;
        }
        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            z-index: 10000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.6);
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: var(--card);
            width: 90%;
            max-width: 500px;
            border-radius: 1rem;
            box-shadow: 0 20px 30px rgba(0,0,0,0.2);
            animation: fadeIn 0.2s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
        }
        .modal-close {
            background: none;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            color: var(--muted-fg);
        }
        .modal-body { padding: 1.5rem; }
        .modal-footer {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
        }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            background: var(--bg);
            color: var(--fg);
        }
        .btn-secondary { background: #e2e8f0; color: var(--fg); }
        footer {
            text-align: center;
            padding: 2rem;
            margin-top: 3rem;
            background: var(--card);
            border-top: 1px solid var(--border);
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo"><a href="index.html">УчебаВместе</a></div>
                <nav>
                    <a href="index.html#subjects">Предметы</a>
                    <a href="teacher.html">Репетиторы</a>
                </nav>
                <div class="user-profile" id="userProfile">
                    <div class="user-avatar" id="userAvatar">Г</div>
                    <div class="user-info">
                        <span id="userGreeting">Здравствуйте,</span>
                        <a href="profile.html" id="userNameLink">Гость</a>
                    </div>
                    <button id="logoutBtn" class="btn btn-outline" style="display: none;" onclick="logout()">Выйти</button>
                    <button id="loginBtn" class="btn btn-primary" onclick="redirectToLogin()">Войти</button>
                </div>
            </div>
        </div>
    </header>

    <section class="teachers-section">
        <div class="container">
            <div class="section-header" style="text-align: center; margin: 2rem 0;">
                <h1>Наши репетиторы</h1>
                <p>Выберите подходящего репетитора из нашей команды профессионалов</p>
            </div>
            <div class="teachers-grid" id="teachersGrid"></div>
        </div>
    </section>

    <!-- Модальное окно записи -->
    <div id="bookingModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="bookingTeacherName">Запись на урок</h2>
                <button class="modal-close" id="closeModalBtn">&times;</button>
            </div>
            <div class="modal-body">
                <form id="bookingForm">
                    <input type="hidden" id="selectedTeacherId">
                    <div class="form-group">
                        <label for="bookingDate">Дата урока</label>
                        <input type="date" id="bookingDate" required>
                    </div>
                    <div class="form-group">
                        <label for="bookingTime">Время урока</label>
                        <select id="bookingTime" required>
                            <option value="">Выберите время</option>
                            <option value="09:00-10:00">09:00 - 10:00</option>
                            <option value="10:30-11:30">10:30 - 11:30</option>
                            <option value="12:00-13:00">12:00 - 13:00</option>
                            <option value="14:00-15:00">14:00 - 15:00</option>
                            <option value="16:00-17:00">16:00 - 17:00</option>
                            <option value="18:00-19:00">18:00 - 19:00</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="bookingSubject">Предмет</label>
                        <input type="text" id="bookingSubject" required>
                    </div>
                    <div class="form-group">
                        <label for="bookingNotes">Дополнительные пожелания</label>
                        <textarea id="bookingNotes" rows="3" placeholder="Укажите темы, которые хотите изучить..."></textarea>
                    </div>
                    <div class="modal-footer" style="padding-left:0; padding-right:0;">
                        <button type="button" class="btn btn-secondary" id="cancelModalBtn">Отмена</button>
                        <button type="submit" class="btn btn-primary">Забронировать урок</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <footer>
        <div class="container">
            <p>&copy; 2025 УчебаВместе. Все права защищены.</p>
        </div>
    </footer>

    <script>
        // ======================= ДАННЫЕ С ЛОКАЛЬНЫМИ КАРТИНКАМИ =======================
        let tutors = [];

        function initDemoTutors() {
            const stored = localStorage.getItem('ucheba_tutors');
            if (stored) {
                tutors = JSON.parse(stored);
            } else {
                tutors = [
                    { id: 1, name: 'Анна Петрова', subjects: 'Математика, Физика', balance: 45000, email: 'anna@ucheba-vmeste.ru', avatar: 'img/Анна Петрова.png', status: 'active', accepting_students: true },
                    { id: 2, name: 'Алексей Козлов', subjects: 'Физика, Математика', balance: 38500, email: 'alexey@ucheba-vmeste.ru', avatar: 'img/Алексей Козлов.png', status: 'active', accepting_students: true },
                    { id: 3, name: 'Иван Сидоров', subjects: 'Английский язык', balance: 52300, email: 'ivan@ucheba-vmeste.ru', avatar: 'img/Иван Сидоров.png', status: 'active', accepting_students: false },
                    { id: 4, name: 'Елена Смирнова', subjects: 'Химия, Биология', balance: 41200, email: 'elena@ucheba-vmeste.ru', avatar: 'img/Елена Смирнова.png', status: 'active', accepting_students: true },
                    { id: 5, name: 'Мария Иванова', subjects: 'Русский язык, Литература', balance: 30000, email: 'maria@ucheba-vmeste.ru', avatar: 'img/Мария Иванова.png', status: 'active', accepting_students: true },
                    { id: 6, name: 'Дмитрий Попов', subjects: 'Программирование, Математика', balance: 25000, email: 'dmitry@ucheba-vmeste.ru', avatar: 'img/Дмитрий Попов.png', status: 'active', accepting_students: false }
                ];
                localStorage.setItem('ucheba_tutors', JSON.stringify(tutors));
            }
        }

        let currentUser = null;

        function loadCurrentUser() {
            const stored = localStorage.getItem('ucheba_current_user');
            if (stored) {
                try { currentUser = JSON.parse(stored); } catch(e) { currentUser = null; }
            }
            updateHeaderUI();
        }

        function updateHeaderUI() {
            const avatarDiv = document.getElementById('userAvatar');
            const userNameLink = document.getElementById('userNameLink');
            const loginBtn = document.getElementById('loginBtn');
            const logoutBtn = document.getElementById('logoutBtn');
            const greetingSpan = document.getElementById('userGreeting');
            if (currentUser) {
                greetingSpan.innerText = 'Здравствуйте,';
                userNameLink.innerText = currentUser.name || 'Пользователь';
                userNameLink.href = 'profile.html';
                avatarDiv.innerText = (currentUser.name ? currentUser.name.charAt(0) : 'П').toUpperCase();
                loginBtn.style.display = 'none';
                logoutBtn.style.display = 'inline-block';
            } else {
                greetingSpan.innerText = 'Вы не авторизованы,';
                userNameLink.innerText = 'войдите';
                userNameLink.href = '#';
                userNameLink.onclick = (e) => { e.preventDefault(); redirectToLogin(); };
                avatarDiv.innerText = 'Г';
                loginBtn.style.display = 'inline-block';
                logoutBtn.style.display = 'none';
            }
        }

        function redirectToLogin() { window.location.href = 'login_simple.html'; }
        function logout() {
            localStorage.removeItem('ucheba_current_user');
            currentUser = null;
            updateHeaderUI();
            alert('Вы вышли из системы');
            location.reload();
        }

        // Отрисовка карточек с локальными картинками + fallback на инициалы
        function renderTeachers() {
            const grid = document.getElementById('teachersGrid');
            if (!grid) return;
            grid.innerHTML = '';
            tutors.forEach(t => {
                const isAccepting = t.accepting_students === true;
                const btnDisabled = !isAccepting ? 'disabled' : '';
                const btnTitle = !isAccepting ? 'Репетитор временно не принимает учеников' : '';
                const notTakingHtml = !isAccepting ? '<span class="not-taking-text"><i class="fas fa-ban"></i> Не принимает новых учеников</span>' : '';
                const avatarUrl = t.avatar || '';
                // fallback: если картинка не загрузится, показываем инициалы
                const fallbackInitials = t.name.split(' ').map(n => n[0]).join('').toUpperCase();
                const onerror = `this.onerror=null; this.parentElement.innerHTML='<div style="width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#1e40af);display:flex;align-items:center;justify-content:center;color:white;font-size:2rem;font-weight:bold;">${fallbackInitials}</div>';`;
                const card = document.createElement('div');
                card.className = 'teacher-card';
                card.innerHTML = `
                    <div class="teacher-card-header">
                        <div class="teacher-avatar">
                            <img src="${avatarUrl}" alt="${t.name}" onerror="${onerror}" style="width:80px;height:80px;border-radius:50%;object-fit:cover;">
                        </div>
                        <div>
                            <h2 class="teacher-name">${t.name}</h2>
                            <p class="teacher-subjects">${t.subjects}</p>
                        </div>
                    </div>
                    <div class="teacher-stats">
                        <div><div class="stat-value">${Math.floor(Math.random()*8)+5} лет</div><div>Опыт</div></div>
                        <div><div class="stat-value">${Math.floor(Math.random()*400)+200}+</div><div>Учеников</div></div>
                    </div>
                    <p class="teacher-description">${t.name} — репетитор по ${t.subjects.split(',')[0]}, подготовка к экзаменам.</p>
                    <div class="teacher-actions">
                        <button class="btn btn-primary" onclick="openBookingModal(${t.id})" ${btnDisabled} title="${btnTitle}">Записаться</button>
                        <button class="btn btn-outline" onclick="viewProfile(${t.id})">Профиль</button>
                    </div>
                    ${notTakingHtml}
                `;
                grid.appendChild(card);
            });
        }

        function viewProfile(teacherId) { alert(`Профиль репетитора ID ${teacherId}. Полная версия в разработке.`); }

        // ОТКРЫТИЕ МОДАЛЬНОГО ОКНА ЗАПИСИ
        window.openBookingModal = function(teacherId) {
            if (!currentUser) {
                alert('Для записи на урок необходимо войти в систему.');
                redirectToLogin();
                return;
            }
            const teacher = tutors.find(t => t.id === teacherId);
            if (!teacher) { alert('Репетитор не найден'); return; }
            if (!teacher.accepting_students) {
                alert('Этот репетитор временно не принимает новых учеников. Выберите другого.');
                return;
            }
            const modal = document.getElementById('bookingModal');
            if (!modal) return;
            document.getElementById('bookingTeacherName').innerText = `Запись на урок к ${teacher.name}`;
            document.getElementById('selectedTeacherId').value = teacherId;
            document.getElementById('bookingSubject').value = teacher.subjects.split(',')[0];
            document.getElementById('bookingDate').value = '';
            document.getElementById('bookingTime').value = '';
            document.getElementById('bookingNotes').value = '';
            modal.style.display = 'flex';
        };

        function closeBookingModal() {
            const modal = document.getElementById('bookingModal');
            if (modal) modal.style.display = 'none';
        }

        function initBookingForm() {
            const form = document.getElementById('bookingForm');
            if (!form) return;
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                if (!currentUser) {
                    alert('Необходимо войти в систему');
                    redirectToLogin();
                    return;
                }
                const teacherId = parseInt(document.getElementById('selectedTeacherId').value);
                const teacher = tutors.find(t => t.id === teacherId);
                if (!teacher || !teacher.accepting_students) {
                    alert('Запись невозможна: репетитор не принимает учеников.');
                    closeBookingModal();
                    return;
                }
                const date = document.getElementById('bookingDate').value;
                const time = document.getElementById('bookingTime').value;
                if (!date || !time) {
                    alert('Выберите дату и время урока');
                    return;
                }
                const subject = document.getElementById('bookingSubject').value;
                const notes = document.getElementById('bookingNotes').value;
                alert(`✅ Урок забронирован!\nРепетитор: ${teacher.name}\nПредмет: ${subject}\nДата: ${date}\nВремя: ${time}\nПожелания: ${notes || 'нет'}`);
                closeBookingModal();
                form.reset();
            });
        }

        function initModalCloseHandlers() {
            const closeBtn = document.getElementById('closeModalBtn');
            const cancelBtn = document.getElementById('cancelModalBtn');
            if (closeBtn) closeBtn.onclick = closeBookingModal;
            if (cancelBtn) cancelBtn.onclick = closeBookingModal;
            window.onclick = function(event) {
                if (event.target.classList && event.target.classList.contains('modal')) {
                    event.target.style.display = 'none';
                }
            };
        }

        function init() {
            initDemoTutors();
            loadCurrentUser();
            renderTeachers();
            initBookingForm();
            initModalCloseHandlers();
        }

        init();
    </script>
</body>
</html>
