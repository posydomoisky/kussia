<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - УчебаВместе</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .login-simple {
            max-width: 400px;
            margin: 50px auto;
            padding: 30px;
            background: var(--card);
            border-radius: 10px;
            box-shadow: var(--shadow-lg);
        }
        .login-simple h1 {
            text-align: center;
            margin-bottom: 20px;
            color: var(--primary);
        }
        .login-simple input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid var(--border);
            border-radius: 5px;
            background: var(--bg);
            color: var(--fg);
        }
        .login-simple button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        .demo-logins {
            margin-top: 20px;
            padding: 15px;
            background: var(--bg);
            border-radius: 5px;
            border: 1px solid var(--border);
        }
        .demo-logins h3 {
            margin-bottom: 10px;
            color: var(--primary);
        }
        .demo-account {
            padding: 8px;
            margin: 5px 0;
            background: var(--card);
            border-radius: 3px;
            cursor: pointer;
            border: 1px solid transparent;
        }
        .demo-account:hover {
            border-color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="login-simple">
        <h1>Вход в УчебаВместе</h1>
        
        <div id="message" style="display: none; padding: 10px; margin-bottom: 10px; border-radius: 5px;"></div>
        
        <form id="loginForm">
            <input type="text" id="login" placeholder="Логин" required>
            <input type="password" id="password" placeholder="Пароль" required>
            <button type="submit">Войти</button>
        </form>
        
        <div class="demo-logins">
            <h3>Демо-аккаунты (нажмите для быстрого входа):</h3>
            <div class="demo-account" onclick="useDemoAccount('admin', 'admin123')">
                <strong>Администратор</strong><br>
                Логин: admin | Пароль: admin123
            </div>
            <div class="demo-account" onclick="useDemoAccount('anna', 'anna123')">
                <strong>Репетитор (Анна Петрова)</strong><br>
                Логин: anna | Пароль: anna123
            </div>
            <div class="demo-account" onclick="useDemoAccount('student', 'student123')">
                <strong>Ученик (Иван Иванов)</strong><br>
                Логин: student | Пароль: student123
            </div>
        </div>
        
        <div style="text-align: center; margin-top: 20px;">
            <a href="index.html">Вернуться на главную</a>
        </div>
    </div>

    <script>
        // Проверяем, уже ли вошел пользователь
        const currentUser = JSON.parse(localStorage.getItem('ucheba_current_user'));
        if (currentUser) {
            // Уже вошел, перенаправляем
            if (currentUser.role === 'admin') {
                window.location.href = 'admin_panel.html';
            } else if (currentUser.role === 'tutor') {
                window.location.href = 'teacher_dashboard.html';
            } else {
                window.location.href = 'profile.html';
            }
        }
        
        // Обработка формы
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const login = document.getElementById('login').value.trim();
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');
            
            // Проверяем заполненность
            if (!login || !password) {
                showMessage('Заполните все поля', 'error');
                return;
            }
            
            // Получаем пользователей
            const users = JSON.parse(localStorage.getItem('ucheba_users')) || [];
            
            // Ищем пользователя
            const user = users.find(u => u.login === login && u.password === password);
            
            if (user) {
                showMessage('Успешный вход! Перенаправление...', 'success');
                
                // Сохраняем сессию
                const { password, ...userSession } = user;
                localStorage.setItem('ucheba_current_user', JSON.stringify(userSession));
                
                // Перенаправляем через секунду
                setTimeout(() => {
                    if (user.role === 'admin') {
                        window.location.href = 'admin_panel.html';
                    } else if (user.role === 'tutor') {
                        window.location.href = 'teacher_dashboard.html';
                    } else {
                        window.location.href = 'profile.html';
                    }
                }, 1000);
            } else {
                showMessage('Неверный логин или пароль', 'error');
            }
        });
        
        // Функция для использования демо-аккаунта
        function useDemoAccount(login, password) {
            document.getElementById('login').value = login;
            document.getElementById('password').value = password;
            document.getElementById('loginForm').dispatchEvent(new Event('submit'));
        }
        
        // Функция показа сообщений
        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.style.display = 'block';
            messageDiv.style.background = type === 'error' ? '#ffebee' : '#e8f5e9';
            messageDiv.style.color = type === 'error' ? '#c62828' : '#2e7d32';
            messageDiv.style.border = type === 'error' ? '1px solid #ffcdd2' : '1px solid #c8e6c9';
        }
        
        // Создаем демо-пользователей если их нет
        if (!localStorage.getItem('ucheba_users')) {
            const demoUsers = [
                {
                    id: 1,
                    firstName: 'Админ',
                    lastName: 'Админов',
                    email: 'admin@ucheba-vmeste.ru',
                    login: 'admin',
                    password: 'admin123',
                    role: 'admin',
                    phone: '+7 (999) 000-00-01'
                },
                {
                    id: 2,
                    firstName: 'Анна',
                    lastName: 'Петрова',
                    email: 'anna@ucheba-vmeste.ru',
                    login: 'anna',
                    password: 'anna123',
                    role: 'tutor',
                    phone: '+7 (999) 123-45-67',
                    subjects: ['Математика', 'Физика']
                },
                {
                    id: 3,
                    firstName: 'Иван',
                    lastName: 'Иванов',
                    email: 'student@example.com',
                    login: 'student',
                    password: 'student123',
                    role: 'student',
                    phone: '+7 (999) 123-45-73'
                }
            ];
            
            localStorage.setItem('ucheba_users', JSON.stringify(demoUsers));
            console.log('Демо-пользователи созданы');
        }
    </script>
</body>
</html>
