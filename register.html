<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - УчебаВместе</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <a href="index.html" class="logo-link">УчебаВместе</a>
                </div>
                <div class="header-actions">
                    <button class="theme-toggle" id="themeToggle" aria-label="Переключить тему">
                        <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="5"></circle>
                            <line x1="12" y1="1" x2="12" y2="3"></line>
                            <line x1="12" y1="21" x2="12" y2="23"></line>
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                            <line x1="1" y1="12" x2="3" y2="12"></line>
                            <line x1="21" y1="12" x2="23" y2="12"></line>
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                        </svg>
                        <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                        </svg>
                    </button>
                    <div id="userAuthSection"></div>
                </div>
            </div>
        </div>
    </header>

    <!-- Registration Section -->
    <section class="register-section">
        <div class="container">
            <div class="register-container">
                <div class="register-card">
                    <div class="register-header">
                        <h1>Регистрация в УчебаВместе</h1>
                        <p>Создайте аккаунт для доступа к урокам</p>
                    </div>
                    
                    <form id="registerForm" class="register-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="firstName">Имя</label>
                                <input type="text" id="firstName" name="firstName" placeholder="Введите имя" required>
                            </div>
                            
                            <div class="form-group">
                                <label for="lastName">Фамилия</label>
                                <input type="text" id="lastName" name="lastName" placeholder="Введите фамилию" required>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" placeholder="Введите email" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="phone">Телефон</label>
                            <input type="tel" id="phone" name="phone" placeholder="+7 (999) 123-45-67" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="userLogin">Логин</label>
                            <input type="text" id="userLogin" name="login" placeholder="Придумайте логин" required>
                            <small class="hint">Минимум 3 символа, можно использовать буквы и цифры</small>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="userPassword">Пароль</label>
                                <div class="password-input">
                                    <input type="password" id="userPassword" name="password" placeholder="Придумайте пароль" required>
                                    <button type="button" class="toggle-password" onclick="togglePassword('userPassword')">
                                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                            <circle cx="12" cy="12" r="3"></circle>
                                        </svg>
                                    </button>
                                </div>
                                <div class="password-strength">
                                    <div class="strength-bar">
                                        <div class="strength-fill" id="passwordStrength"></div>
                                    </div>
                                    <div class="strength-text" id="passwordStrengthText">Надежность пароля</div>
                                </div>
                            </div>
                            
                            <div class="form-group">
                                <label for="confirmPassword">Подтверждение пароля</label>
                                <div class="password-input">
                                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Повторите пароль" required>
                                    <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword')">
                                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                            <circle cx="12" cy="12" r="3"></circle>
                                        </svg>
                                    </button>
                                </div>
                                <div id="passwordMatch" class="error-message"></div>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label for="userType">Тип аккаунта</label>
                            <select id="userType" name="role" required>
                                <option value="">Выберите тип аккаунта</option>
                                <option value="student">Ученик</option>
                                <option value="tutor">Репетитор</option>
                            </select>
                        </div>
                        
                        <!-- Additional fields for tutors -->
                        <div id="tutorFields" style="display: none;">
                            <div class="form-group">
                                <label for="subjects">Предметы</label>
                                <input type="text" id="subjects" name="subjects" placeholder="Например: Математика, Физика">
                                <small class="hint">Укажите предметы, которые вы преподаёте</small>
                            </div>
                            
                            <div class="form-group">
                                <label for="experience">Опыт работы (лет)</label>
                                <input type="number" id="experience" name="experience" min="0" max="50" placeholder="0">
                            </div>
                            
                            <div class="form-group">
                                <label for="education">Образование</label>
                                <textarea id="education" name="education" rows="2" placeholder="Ваше образование и квалификация"></textarea>
                            </div>
                        </div>
                        
                        <!-- Additional fields for students -->
                        <div id="studentFields" style="display: none;">
                            <div class="form-group">
                                <label for="grade">Класс/Курс</label>
                                <input type="text" id="grade" name="grade" placeholder="Например: 11 класс">
                            </div>
                            
                            <div class="form-group">
                                <label for="interests">Интересы</label>
                                <input type="text" id="interests" name="interests" placeholder="Например: Математика, Программирование">
                                <small class="hint">Какие предметы вас интересуют</small>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label class="checkbox">
                                <input type="checkbox" id="terms" required>
                                <span class="checkmark"></span>
                                Я согласен с <a href="#terms">условиями использования</a> и <a href="#privacy">политикой конфиденциальности</a>
                            </label>
                        </div>
                        
                        <button type="submit" class="btn btn-primary btn-full">
                            <span class="btn-text">Зарегистрироваться</span>
                            <span class="btn-loading">
                                <span class="spinner"></span>
                            </span>
                        </button>
                        
                        <div id="registerMessage" class="error-message"></div>
                    </form>
                    
                    <div class="register-footer">
                        <p>Уже есть аккаунт? <a href="login.html">Войти</a></p>
                        <p><a href="index.html">Вернуться на главную</a></p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="js/auth.js"></script>
    <script src="js/register.js"></script>
</body>
</html>
