<script>
    // ========================================================
    // 1. ТЕСТОВЫЕ (ДЕМО) ПОЛЬЗОВАТЕЛИ
    // ========================================================
    const testUsers = [
        {
            id: 1,
            firstName: 'Админ',
            lastName: 'Админов',
            login: 'admin',
            password: 'admin123',
            user_type: 'admin',
            email: 'admin@ucheba-vmeste.ru',
            phone: '+7 (999) 000-00-01'
        },
        {
            id: 2,
            firstName: 'Анна',
            lastName: 'Петрова',
            login: 'anna',
            password: 'anna123',
            user_type: 'tutor',
            email: 'anna@ucheba-vmeste.ru',
            phone: '+7 (999) 123-45-67',
            subjects: ['Математика', 'Физика']
        },
        {
            id: 3,
            firstName: 'Иван',
            lastName: 'Иванов',
            login: 'student',
            password: 'student123',
            user_type: 'student',
            email: 'student@example.com',
            phone: '+7 (999) 123-45-73'
        }
    ];

    // ========================================================
    // 2. ИНИЦИАЛИЗАЦИЯ ХРАНИЛИЩА
    // ========================================================
    function initUsersStorage() {
        if (!localStorage.getItem('ucheba_users')) {
            localStorage.setItem('ucheba_users', JSON.stringify(testUsers));
            console.log('✅ Демо-пользователи созданы в localStorage');
        } else {
            // Проверяем, что все демо-пользователи на месте (на случай если их удалили вручную)
            const existingUsers = JSON.parse(localStorage.getItem('ucheba_users')) || [];
            let needUpdate = false;
            
            testUsers.forEach(demoUser => {
                if (!existingUsers.find(u => u.login === demoUser.login)) {
                    existingUsers.push(demoUser);
                    needUpdate = true;
                }
            });
            
            if (needUpdate) {
                localStorage.setItem('ucheba_users', JSON.stringify(existingUsers));
                console.log('✅ Демо-пользователи восстановлены');
            }
        }
    }

    // ========================================================
    // 3. ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
    // ========================================================
    function getUsers() {
        return JSON.parse(localStorage.getItem('ucheba_users')) || [];
    }

    function saveUsers(users) {
        localStorage.setItem('ucheba_users', JSON.stringify(users));
    }

    function findUserByLogin(login) {
        const users = getUsers();
        return users.find(u => u.login.toLowerCase() === login.toLowerCase());
    }

    function findUserByEmail(email) {
        const users = getUsers();
        return users.find(u => u.email && u.email.toLowerCase() === email.toLowerCase());
    }

    function findUserByLoginOrEmail(loginOrEmail) {
        // Сначала пробуем найти по логину
        let user = findUserByLogin(loginOrEmail);
        if (user) return user;
        
        // Потом по email
        user = findUserByEmail(loginOrEmail);
        if (user) return user;
        
        return null;
    }

    function authenticateUser(loginOrEmail, password) {
        const user = findUserByLoginOrEmail(loginOrEmail);
        if (user && user.password === password) {
            return user;
        }
        return null;
    }

    // ========================================================
    // 4. ПЕРЕКЛЮЧЕНИЕ МЕЖДУ ФОРМАМИ
    // ========================================================
    function showForm(formType) {
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');
        const loginTab = document.getElementById('login-tab');
        const registerTab = document.getElementById('register-tab');
        
        if (formType === 'login') {
            loginForm.classList.add('active');
            registerForm.classList.remove('active');
            loginTab.classList.add('active');
            registerTab.classList.remove('active');
            clearErrors('login');
            clearSuccess('login');
            clearSuccess('register');
        } else {
            loginForm.classList.remove('active');
            registerForm.classList.add('active');
            loginTab.classList.remove('active');
            registerTab.classList.add('active');
            clearErrors('register');
            clearSuccess('login');
            clearSuccess('register');
        }
    }

    // ========================================================
    // 5. ОТОБРАЖЕНИЕ ОШИБОК И УСПЕХА
    // ========================================================
    function showErrors(formType, errors) {
        const errorContainer = document.getElementById(`${formType}-errors`);
        errorContainer.innerHTML = '';
        errorContainer.classList.remove('show');
        
        if (errors && errors.length > 0) {
            errors.forEach(error => {
                const div = document.createElement('div');
                div.className = 'error-message';
                div.textContent = error;
                errorContainer.appendChild(div);
            });
            errorContainer.classList.add('show');
        }
    }

    function showSuccess(formType, message) {
        const successContainer = document.getElementById(`${formType}-success`);
        successContainer.innerHTML = '';
        successContainer.classList.remove('show');
        
        const div = document.createElement('div');
        div.className = 'success-message';
        div.textContent = message;
        successContainer.appendChild(div);
        successContainer.classList.add('show');
    }

    function clearErrors(formType) {
        const container = document.getElementById(`${formType}-errors`);
        if (container) {
            container.innerHTML = '';
            container.classList.remove('show');
        }
    }

    function clearSuccess(formType) {
        const container = document.getElementById(`${formType}-success`);
        if (container) {
            container.innerHTML = '';
            container.classList.remove('show');
        }
    }

    // ========================================================
    // 6. ВАЛИДАЦИЯ ФОРМ
    // ========================================================
    function validateLoginForm() {
        const login = document.getElementById('login-username').value.trim();
        const password = document.getElementById('login-password').value;
        const errors = [];
        
        // Очищаем ошибки полей
        document.getElementById('login-username-error').textContent = '';
        document.getElementById('login-username-error').classList.remove('show');
        document.getElementById('login-password-error').textContent = '';
        document.getElementById('login-password-error').classList.remove('show');
        
        if (!login) {
            document.getElementById('login-username-error').textContent = 'Введите логин или email';
            document.getElementById('login-username-error').classList.add('show');
            errors.push('Введите логин или email');
        }
        
        if (!password) {
            document.getElementById('login-password-error').textContent = 'Введите пароль';
            document.getElementById('login-password-error').classList.add('show');
            errors.push('Введите пароль');
        } else if (password.length < 6) {
            document.getElementById('login-password-error').textContent = 'Пароль должен быть не менее 6 символов';
            document.getElementById('login-password-error').classList.add('show');
            errors.push('Пароль должен быть не менее 6 символов');
        }
        
        return errors;
    }

    function validateRegisterForm() {
        const firstName = document.getElementById('register-first-name').value.trim();
        const lastName = document.getElementById('register-last-name').value.trim();
        const login = document.getElementById('register-username').value.trim();
        const password = document.getElementById('register-password').value;
        const confirmPassword = document.getElementById('register-confirm-password').value;
        const userType = document.getElementById('register-user-type').value;
        const agreeTerms = document.getElementById('register-agree-terms').checked;
        const errors = [];
        
        // Очищаем ошибки полей
        ['register-first-name', 'register-last-name', 'register-username', 
         'register-password', 'register-confirm-password', 'register-user-type', 
         'register-terms-error'].forEach(id => {
            const el = document.getElementById(id + '-error') || document.getElementById(id);
            if (el) {
                el.textContent = '';
                el.classList.remove('show');
            }
        });
        
        // Имя
        if (!firstName) {
            document.getElementById('register-first-name-error').textContent = 'Введите имя';
            document.getElementById('register-first-name-error').classList.add('show');
            errors.push('Введите имя');
        } else if (firstName.length < 2) {
            document.getElementById('register-first-name-error').textContent = 'Имя слишком короткое';
            document.getElementById('register-first-name-error').classList.add('show');
            errors.push('Имя слишком короткое');
        }
        
        // Фамилия
        if (!lastName) {
            document.getElementById('register-last-name-error').textContent = 'Введите фамилию';
            document.getElementById('register-last-name-error').classList.add('show');
            errors.push('Введите фамилию');
        } else if (lastName.length < 2) {
            document.getElementById('register-last-name-error').textContent = 'Фамилия слишком короткая';
            document.getElementById('register-last-name-error').classList.add('show');
            errors.push('Фамилия слишком короткая');
        }
        
        // Логин
        if (!login) {
            document.getElementById('register-username-error').textContent = 'Введите логин';
            document.getElementById('register-username-error').classList.add('show');
            errors.push('Введите логин');
        } else if (login.length < 3) {
            document.getElementById('register-username-error').textContent = 'Логин должен быть не менее 3 символов';
            document.getElementById('register-username-error').classList.add('show');
            errors.push('Логин должен быть не менее 3 символов');
        } else if (!/^[a-zA-Z0-9_]+$/.test(login)) {
            document.getElementById('register-username-error').textContent = 'Только буквы, цифры и _';
            document.getElementById('register-username-error').classList.add('show');
            errors.push('Только буквы, цифры и _');
        } else if (findUserByLogin(login)) {
            document.getElementById('register-username-error').textContent = 'Этот логин уже занят';
            document.getElementById('register-username-error').classList.add('show');
            errors.push('Этот логин уже занят');
        }
        
        // Пароль
        if (!password) {
            document.getElementById('register-password-error').textContent = 'Введите пароль';
            document.getElementById('register-password-error').classList.add('show');
            errors.push('Введите пароль');
        } else if (password.length < 6) {
            document.getElementById('register-password-error').textContent = 'Пароль должен быть не менее 6 символов';
            document.getElementById('register-password-error').classList.add('show');
            errors.push('Пароль должен быть не менее 6 символов');
        }
        
        // Подтверждение пароля
        if (!confirmPassword) {
            document.getElementById('register-confirm-password-error').textContent = 'Подтвердите пароль';
            document.getElementById('register-confirm-password-error').classList.add('show');
            errors.push('Подтвердите пароль');
        } else if (password !== confirmPassword) {
            document.getElementById('register-confirm-password-error').textContent = 'Пароли не совпадают';
            document.getElementById('register-confirm-password-error').classList.add('show');
            errors.push('Пароли не совпадают');
        }
        
        // Тип пользователя
        if (!userType) {
            document.getElementById('register-user-type-error').textContent = 'Выберите тип аккаунта';
            document.getElementById('register-user-type-error').classList.add('show');
            errors.push('Выберите тип аккаунта');
        }
        
        // Согласие
        if (!agreeTerms) {
            document.getElementById('register-terms-error').textContent = 'Согласитесь с условиями';
            document.getElementById('register-terms-error').classList.add('show');
            errors.push('Согласитесь с условиями');
        }
        
        // Проверка предметов для репетитора
        if (userType === 'tutor') {
            const subjects = document.querySelectorAll('input[name="tutor_subjects"]:checked');
            if (subjects.length === 0) {
                document.getElementById('tutor-subjects-error').textContent = 'Выберите хотя бы один предмет';
                document.getElementById('tutor-subjects-error').classList.add('show');
                errors.push('Выберите хотя бы один предмет');
            }
        }
        
        // Проверка языков для переводчика
        if (userType === 'translator') {
            const languages = document.querySelectorAll('input[name="translator_languages"]:checked');
            if (languages.length === 0) {
                document.getElementById('translator-languages-error').textContent = 'Выберите хотя бы один язык';
                document.getElementById('translator-languages-error').classList.add('show');
                errors.push('Выберите хотя бы один язык');
            }
        }
        
        return errors;
    }

    // ========================================================
    // 7. ПЕРЕКЛЮЧЕНИЕ ВИДИМОСТИ ПАРОЛЯ
    // ========================================================
    function setupPasswordToggle(passwordId, toggleId) {
        const toggleBtn = document.getElementById(toggleId);
        const passwordInput = document.getElementById(passwordId);
        
        if (!toggleBtn || !passwordInput) return;
        
        toggleBtn.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.querySelector('svg').innerHTML = type === 'text' 
                ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>'
                : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
        });
    }

    // ========================================================
    // 8. СИЛА ПАРОЛЯ
    // ========================================================
    function setupPasswordStrength() {
        const passwordInput = document.getElementById('register-password');
        const strengthFill = document.getElementById('strength-fill');
        const strengthText = document.getElementById('strength-text');
        
        if (!passwordInput) return;
        
        passwordInput.addEventListener('input', function() {
            const value = this.value;
            let strength = 0;
            let color = '#e53e3e';
            let text = 'Слабый пароль';
            
            if (value.length >= 6) strength += 25;
            if (value.match(/[a-z]/) && value.match(/[A-Z]/)) strength += 25;
            if (value.match(/\d/)) strength += 25;
            if (value.match(/[^a-zA-Z\d]/)) strength += 25;
            
            strengthFill.style.width = Math.min(strength, 100) + '%';
            
            if (strength >= 75) {
                color = '#38a169';
                text = 'Сильный пароль';
            } else if (strength >= 50) {
                color = '#d69e2e';
                text = 'Средний пароль';
            }
            
            strengthFill.style.background = color;
            strengthText.textContent = text;
            strengthText.style.color = color;
        });
    }

    // ========================================================
    // 9. ПОКАЗ ДОПОЛНИТЕЛЬНЫХ ПОЛЕЙ
    // ========================================================
    function setupRoleFields() {
        const userTypeSelect = document.getElementById('register-user-type');
        const tutorFields = document.getElementById('tutor-fields');
        const translatorFields = document.getElementById('translator-fields');
        
        if (!userTypeSelect) return;
        
        userTypeSelect.addEventListener('change', function() {
            tutorFields.classList.remove('show');
            translatorFields.classList.remove('show');
            
            if (this.value === 'tutor') {
                tutorFields.classList.add('show');
            } else if (this.value === 'translator') {
                translatorFields.classList.add('show');
            }
        });
    }

    // ========================================================
    // 10. ДЕМО-АККАУНТЫ
    // ========================================================
    function setupDemoAccounts() {
        const toggleLink = document.getElementById('showDemoAccounts');
        const container = document.getElementById('demoAccountsContainer');
        
        if (!toggleLink || !container) return;
        
        toggleLink.addEventListener('click', function(e) {
            e.preventDefault();
            container.classList.toggle('show');
            this.textContent = container.classList.contains('show') ? 'Скрыть демо-аккаунты' : 'Демо-аккаунты';
        });
        
        // Делаем функцию доступной глобально
        window.useDemoAccount = function(login, password) {
            showForm('login');
            document.getElementById('login-username').value = login;
            document.getElementById('login-password').value = password;
            document.getElementById('remember-me').checked = true;
            
            if (container) {
                container.classList.remove('show');
                toggleLink.textContent = 'Демо-аккаунты';
            }
            
            const success = document.getElementById('login-success');
            success.textContent = 'Демо-аккаунт загружен. Нажмите "Войти"';
            success.classList.add('show');
            
            setTimeout(() => success.classList.remove('show'), 3000);
            
            document.getElementById('login-btn').focus();
        };
    }

    // ========================================================
    // 11. ОБРАБОТЧИК ВХОДА
    // ========================================================
    function setupLoginHandler() {
        const form = document.getElementById('login-form');
        if (!form) return;
        
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('login-btn');
            btn.classList.add('loading');
            
            const errors = validateLoginForm();
            
            if (errors.length === 0) {
                const loginOrEmail = document.getElementById('login-username').value.trim();
                const password = document.getElementById('login-password').value;
                const rememberMe = document.getElementById('remember-me').checked;
                
                // Аутентификация
                const user = authenticateUser(loginOrEmail, password);
                
                if (user) {
                    // Сохраняем сессию
                    localStorage.setItem('ucheba_current_user', JSON.stringify(user));
                    
                    if (rememberMe) {
                        localStorage.setItem('remembered_login', loginOrEmail);
                    } else {
                        localStorage.removeItem('remembered_login');
                    }
                    
                    showSuccess('login', 'Вход выполнен! Перенаправление...');
                    btn.classList.remove('loading');
                    
                    // Определяем страницу для перенаправления
                    let redirectPage = 'profile.html';
                    if (user.user_type === 'admin') {
                        redirectPage = 'admin_panel.html';
                    } else if (user.user_type === 'tutor') {
                        redirectPage = 'teacher_dashboard.html';
                    }
                    
                    setTimeout(() => {
                        window.location.href = redirectPage;
                    }, 1000);
                    
                } else {
                    btn.classList.remove('loading');
                    
                    document.getElementById('login-username-error').textContent = 'Неверный логин/email или пароль';
                    document.getElementById('login-username-error').classList.add('show');
                    document.getElementById('login-password-error').textContent = 'Неверный логин/email или пароль';
                    document.getElementById('login-password-error').classList.add('show');
                    
                    showErrors('login', ['Неверный логин/email или пароль']);
                }
            } else {
                btn.classList.remove('loading');
                showErrors('login', errors);
            }
        });
    }

    // ========================================================
    // 12. ОБРАБОТЧИК РЕГИСТРАЦИИ
    // ========================================================
    function setupRegisterHandler() {
        const form = document.getElementById('register-form');
        if (!form) return;
        
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('register-btn');
            btn.classList.add('loading');
            
            const errors = validateRegisterForm();
            
            if (errors.length === 0) {
                // Собираем данные
                const userData = {
                    id: Date.now(),
                    firstName: document.getElementById('register-first-name').value.trim(),
                    lastName: document.getElementById('register-last-name').value.trim(),
                    login: document.getElementById('register-username').value.trim(),
                    password: document.getElementById('register-password').value,
                    user_type: document.getElementById('register-user-type').value,
                    registration_date: new Date().toISOString()
                };
                
                // Добавляем дополнительные поля для репетитора
                if (userData.user_type === 'tutor') {
                    userData.subjects = Array.from(document.querySelectorAll('input[name="tutor_subjects"]:checked')).map(cb => cb.value);
                    userData.education = document.getElementById('tutor-education').value.trim();
                    userData.experience = document.getElementById('tutor-experience').value.trim();
                    userData.hourly_rate = document.getElementById('tutor-hourly-rate').value;
                }
                
                // Для переводчика
                if (userData.user_type === 'translator') {
                    userData.languages = Array.from(document.querySelectorAll('input[name="translator_languages"]:checked')).map(cb => cb.value);
                    userData.education = document.getElementById('translator-education').value.trim();
                    userData.experience = document.getElementById('translator-experience').value.trim();
                    userData.specialization = document.getElementById('translator-specialization').value;
                    userData.rate = document.getElementById('translator-rate').value;
                }
                
                // Сохраняем
                const users = getUsers();
                users.push(userData);
                saveUsers(users);
                
                // Автоматический вход
                localStorage.setItem('ucheba_current_user', JSON.stringify(userData));
                
                showSuccess('register', 'Регистрация успешна! Перенаправление...');
                btn.classList.remove('loading');
                
                // Определяем страницу для перенаправления
                let redirectPage = 'profile.html';
                if (userData.user_type === 'admin') {
                    redirectPage = 'admin_panel.html';
                } else if (userData.user_type === 'tutor') {
                    redirectPage = 'teacher_dashboard.html';
                }
                
                setTimeout(() => {
                    window.location.href = redirectPage;
                }, 1500);
                
            } else {
                btn.classList.remove('loading');
                showErrors('register', errors);
            }
        });
    }

    // ========================================================
    // 13. ВОССТАНОВЛЕНИЕ ЗАПОМНЕННОГО ЛОГИНА
    // ========================================================
    function restoreRememberedLogin() {
        const remembered = localStorage.getItem('remembered_login');
        if (remembered) {
            document.getElementById('login-username').value = remembered;
            document.getElementById('remember-me').checked = true;
        }
    }

    // ========================================================
    // 14. ТЕМА
    // ========================================================
    function setupTheme() {
        const toggle = document.getElementById('themeToggle');
        if (!toggle) return;
        
        const isDark = localStorage.getItem('theme') === 'dark';
        if (isDark) {
            document.documentElement.classList.add('dark');
        }
        
        toggle.addEventListener('click', function() {
            const dark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', dark ? 'dark' : 'light');
        });
    }

    // ========================================================
    // 15. ИНИЦИАЛИЗАЦИЯ
    // ========================================================
    document.addEventListener('DOMContentLoaded', function() {
        console.log('🚀 Загрузка страницы авторизации');
        
        // Инициализация хранилища
        initUsersStorage();
        
        // Настройка интерфейса
        setupTheme();
        setupPasswordToggle('login-password', 'toggle-login-password');
        setupPasswordToggle('register-password', 'toggle-register-password');
        setupPasswordToggle('register-confirm-password', 'toggle-register-confirm-password');
        setupPasswordStrength();
        setupRoleFields();
        setupDemoAccounts();
        
        // Обработчики форм
        setupLoginHandler();
        setupRegisterHandler();
        
        // Восстановление данных
        restoreRememberedLogin();
        
        console.log('✅ Страница авторизации готова');
    });
</script>
